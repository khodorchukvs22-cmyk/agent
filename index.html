<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APEX">
<meta name="theme-color" content="#030507">
<title>APEX Agent</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg: #030507;
    --card: #0a0f0a;
    --input-bg: #0f150f;
    --green: #00ff88;
    --green-dim: rgba(0,255,136,0.08);
    --border: rgba(0,255,136,0.15);
    --border-bright: rgba(0,255,136,0.35);
    --text: #d4ffd4;
    --text-dim: #668866;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; height: -webkit-fill-available; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    background: var(--bg); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-icon { width:38px; height:38px; border-radius:10px; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .header-title { font-size:15px; font-weight:800; color:var(--green); letter-spacing:1.5px; }
  .header-sub { font-size:9px; color:var(--text-dim); letter-spacing:1px; }
  .new-btn { margin-left:auto; background:var(--green-dim); border:1px solid var(--border-bright); border-radius:10px; padding:7px 12px; color:var(--green); font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }

  /* Tabs */
  .tab-bar {
    display: flex; background: var(--card);
    border-top: 1px solid var(--border);
    padding: 10px 0 calc(var(--safe-bottom) + 8px);
    flex-shrink: 0;
  }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; border:none; background:none; padding:0; }
  .tab-icon { font-size:22px; opacity:0.4; transition:opacity .2s; }
  .tab-label { font-size:10px; font-weight:600; color:var(--text-dim); transition:color .2s; }
  .tab.active .tab-icon { opacity:1; }
  .tab.active .tab-label { color:var(--green); }

  /* Screens */
  .screen { flex:1; display:none; flex-direction:column; overflow:hidden; }
  .screen.active { display:flex; }

  /* Chat */
  .messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; -webkit-overflow-scrolling:touch; }
  .bubble-row { display:flex; align-items:flex-end; gap:8px; }
  .bubble-row.user { flex-direction:row-reverse; }
  .avatar { width:28px; height:28px; border-radius:8px; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .bubble { border-radius:18px; padding:12px 14px; max-width:78%; font-size:15px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
  .bubble.ai { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-bottom-left-radius:4px; color:var(--text); }
  .bubble.user { background:var(--green); border-bottom-right-radius:4px; color:#000; font-weight:600; }

  /* Code block */
  .code-block { background:#050d05; border-radius:10px; overflow:hidden; margin-top:8px; border:1px solid var(--border); }
  .code-header { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:#0a140a; border-bottom:1px solid var(--border); }
  .code-lang { color:var(--green); font-size:10px; font-weight:700; letter-spacing:1px; font-family:monospace; }
  .copy-btn { border:1px solid var(--green); border-radius:5px; padding:3px 10px; font-size:10px; font-weight:700; color:var(--green); background:none; cursor:pointer; }
  .copy-btn.done { background:var(--green); color:#000; }
  .code-content { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .code-content pre { color:#7fff9f; font-size:12px; font-family:Menlo,monospace; padding:12px; line-height:1.6; white-space:pre; }

  /* Typing */
  .typing-dots span { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); margin:0 2px; animation:dot 1.2s ease-in-out infinite; }
  .typing-dots span:nth-child(2) { animation-delay:.2s; }
  .typing-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes dot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  /* Quick prompts */
  .quick-wrap { flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }
  .quick-label { text-align:center; color:var(--text-dim); font-size:10px; letter-spacing:2px; margin:16px 0 10px; }
  .quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .quick-btn { background:var(--green-dim); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:left; cursor:pointer; }
  .quick-icon { font-size:22px; display:block; margin-bottom:6px; }
  .quick-text { color:var(--text); font-size:13px; font-weight:600; line-height:1.4; }

  /* Input */
  .input-bar { border-top:1px solid var(--border); background:var(--input-bg); padding:10px 16px calc(var(--safe-bottom) + 12px); flex-shrink:0; }
  .input-wrap { display:flex; align-items:flex-end; gap:8px; background:var(--green-dim); border:1px solid var(--border-bright); border-radius:20px; padding:8px 8px 8px 14px; }
  textarea { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:15px; line-height:1.5; resize:none; max-height:100px; font-family:-apple-system,sans-serif; }
  textarea::placeholder { color:var(--text-dim); }
  .send-btn { width:36px; height:36px; border-radius:18px; background:var(--green); border:none; color:#000; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity .2s; }
  .send-btn:disabled { opacity:0.3; }

  /* History */
  .history-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; -webkit-overflow-scrolling:touch; }
  .chat-row { display:flex; align-items:center; gap:12px; background:var(--card); border-radius:14px; padding:14px; border:1px solid var(--border); cursor:pointer; }
  .chat-row-icon { width:42px; height:42px; border-radius:10px; background:var(--green-dim); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .chat-row-body { flex:1; min-width:0; }
  .chat-row-title { color:var(--text); font-size:14px; font-weight:600; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chat-row-meta { color:var(--text-dim); font-size:11px; }
  .chat-row-chevron { color:var(--text-dim); font-size:22px; flex-shrink:0; }
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:40px; }
  .empty-icon { font-size:52px; }
  .empty-title { color:var(--text); font-size:20px; font-weight:700; }
  .empty-sub { color:var(--text-dim); font-size:14px; text-align:center; }

  /* Install banner */
  .install-banner { background:rgba(0,255,136,0.1); border:1px solid var(--border-bright); border-radius:12px; padding:12px 14px; margin:12px 16px 0; display:flex; align-items:center; gap:10px; }
  .install-banner p { color:var(--text); font-size:12px; line-height:1.5; flex:1; }
  .install-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">⚡</div>
    <div>
      <div class="header-title" id="header-title">APEX AGENT</div>
      <div class="header-sub" id="header-sub">САЙТЫ • ПРОДАЖИ</div>
    </div>
    <button class="new-btn" onclick="newChat()">+ Новый</button>
  </div>

  <div id="install-banner" class="install-banner" style="display:none">
    <p>📱 Добавь на экран: Safari → <strong>Поделиться</strong> → <strong>На экран «Домой»</strong></p>
    <button class="install-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
  </div>

  <!-- Chat screen -->
  <div class="screen active" id="screen-chat">
    <div id="quick-screen" class="quick-wrap">
      <div class="bubble-row">
        <div class="avatar">⚡</div>
        <div class="bubble ai">Привет. Я — APEX.<br><br>Создаю сайты и закрываю сделки лучше любого менеджера.<br><br>💡 Опиши свой бизнес — выдам готовый сайт за минуты.<br><br>Что за проект?</div>
      </div>
      <div class="quick-label">— БЫСТРЫЙ СТАРТ —</div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="sendMsg('Сайт для ресторана')"><span class="quick-icon">🍕</span><span class="quick-text">Сайт для ресторана</span></button>
        <button class="quick-btn" onclick="sendMsg('Лендинг для юристов')"><span class="quick-icon">⚖️</span><span class="quick-text">Лендинг для юристов</span></button>
        <button class="quick-btn" onclick="sendMsg('Сайт фитнес-клуба')"><span class="quick-icon">💪</span><span class="quick-text">Сайт фитнес-клуба</span></button>
        <button class="quick-btn" onclick="sendMsg('Сайт строительной компании')"><span class="quick-icon">🏗️</span><span class="quick-text">Сайт строительной компании</span></button>
        <button class="quick-btn" onclick="sendMsg('Портфолио для мастера')"><span class="quick-icon">💅</span><span class="quick-text">Портфолио для мастера</span></button>
        <button class="quick-btn" onclick="sendMsg('Лендинг для стартапа')"><span class="quick-icon">🚀</span><span class="quick-text">Лендинг для стартапа</span></button>
      </div>
    </div>
    <div id="messages" class="messages" style="display:none"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="input" placeholder="Опиши бизнес или запроси сайт..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>↑</button>
      </div>
    </div>
  </div>

  <!-- History screen -->
  <div class="screen" id="screen-history">
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tab-chat" onclick="switchTab('chat')">
      <span class="tab-icon">⚡</span>
      <span class="tab-label">Чат</span>
    </button>
    <button class="tab" id="tab-history" onclick="switchTab('history')">
      <span class="tab-icon">📂</span>
      <span class="tab-label">История</span>
    </button>
  </div>
</div>

<script>
const SYSTEM = `Ты — APEX, элитный AI-агент. Создаёшь сайты для бизнеса и продаёшь услуги на высшем уровне.

1. СОЗДАНИЕ САЙТОВ: генерируй полный HTML/CSS/JS код в блоке \`\`\`html ... \`\`\` для любого бизнеса. Делай красивый современный дизайн.

2. ПРОДАЖИ: используй SPIN-продажи, работай с возражениями, создавай срочность.

Стиль: уверенный, конкретный, по-русски. Каждое сообщение двигает к продаже. Ты ЗАКРЫВАЕШЬ СДЕЛКУ.`;

let messages = [];
let chats = JSON.parse(localStorage.getItem('apex-chats') || '[]');
let currentChatId = null;
let loading = false;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// Show install banner on iOS Safari
if (/iphone|ipad/i.test(navigator.userAgent) && !navigator.standalone) {
  document.getElementById('install-banner').style.display = 'flex';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  document.getElementById('send-btn').disabled = !el.value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
    e.preventDefault();
    sendMsg();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  const hTitle = document.getElementById('header-title');
  const hSub = document.getElementById('header-sub');
  const newBtn = document.querySelector('.new-btn');
  if (tab === 'history') {
    hTitle.textContent = 'ИСТОРИЯ';
    hSub.textContent = chats.length + ' чатов';
    newBtn.style.display = 'none';
    renderHistory();
  } else {
    hTitle.textContent = 'APEX AGENT';
    hSub.textContent = 'САЙТЫ • ПРОДАЖИ';
    newBtn.style.display = '';
  }
}

function newChat() {
  currentChatId = null;
  messages = [];
  document.getElementById('quick-screen').style.display = '';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('input').value = '';
  document.getElementById('send-btn').disabled = true;
  switchTab('chat');
}

function saveChats() {
  localStorage.setItem('apex-chats', JSON.stringify(chats));
}

function saveCurrentChat() {
  if (!currentChatId) return;
  const idx = chats.findIndex(c => c.id === currentChatId);
  const chat = { id: currentChatId, messages: [...messages], updatedAt: Date.now() };
  if (idx >= 0) chats[idx] = chat;
  else chats.unshift(chat);
  saveChats();
}

function parseContent(text) {
  const parts = [];
  const re = /```(\w+)?\n([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ type: 'text', content: text.slice(last, m.index) });
    parts.push({ type: 'code', lang: m[1] || 'code', content: m[2].trim() });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ type: 'text', content: text.slice(last) });
  return parts;
}

function renderBubble(msg) {
  const isUser = msg.role === 'user';
  const row = document.createElement('div');
  row.className = 'bubble-row' + (isUser ? ' user' : '');

  if (!isUser) {
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = '⚡';
    row.appendChild(av);
  }

  const bub = document.createElement('div');
  bub.className = 'bubble ' + (isUser ? 'user' : 'ai');

  const parts = parseContent(msg.content);
  parts.forEach(p => {
    if (p.type === 'text') {
      const span = document.createElement('span');
      span.style.whiteSpace = 'pre-wrap';
      span.textContent = p.content;
      bub.appendChild(span);
    } else {
      const cb = document.createElement('div');
      cb.className = 'code-block';
      const id = 'cb-' + genId();
      cb.innerHTML = `
        <div class="code-header">
          <span class="code-lang">${p.lang.toUpperCase()}</span>
          <button class="copy-btn" id="${id}" onclick="copyCode('${id}', this)">Копировать</button>
        </div>
        <div class="code-content"><pre></pre></div>`;
      cb.querySelector('pre').textContent = p.content;
      cb.dataset.code = p.content;
      bub.appendChild(cb);
    }
  });

  row.appendChild(bub);
  return row;
}

function copyCode(id, btn) {
  const cb = btn.closest('.code-block');
  navigator.clipboard.writeText(cb.dataset.code).then(() => {
    btn.textContent = '✓ Скопировано';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('done'); }, 2000);
  });
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

async function sendMsg(text) {
  const input = document.getElementById('input');
  const msg = text || input.value.trim();
  if (!msg || loading) return;

  if (!currentChatId) {
    currentChatId = genId();
    document.getElementById('quick-screen').style.display = 'none';
    document.getElementById('messages').style.display = '';
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  messages.push({ role: 'user', content: msg });
  const messagesEl = document.getElementById('messages');
  messagesEl.appendChild(renderBubble({ role: 'user', content: msg }));
  scrollToBottom();

  // Typing indicator
  const typingRow = document.createElement('div');
  typingRow.className = 'bubble-row';
  typingRow.innerHTML = '<div class="avatar">⚡</div><div class="bubble ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(typingRow);
  scrollToBottom();

  loading = true;

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'x-api-key': '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', 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM,
        messages: [{role: 'system', content: SYSTEM}, ...messages.map(m => ({ role: m.role, content: m.content }))]
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Ошибка — попробуй снова.';
    typingRow.remove();
    messages.push({ role: 'assistant', content: reply });
    messagesEl.appendChild(renderBubble({ role: 'assistant', content: reply }));
    saveCurrentChat();
  } catch(e) {
    typingRow.remove();
    const errMsg = { role: 'assistant', content: '⚡ Нет соединения. Проверь интернет и попробуй снова.' };
    messages.push(errMsg);
    messagesEl.appendChild(renderBubble(errMsg));
  }

  loading = false;
  scrollToBottom();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (chats.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><div class="empty-title">Нет чатов</div><div class="empty-sub">Начни разговор на вкладке Чат</div></div>';
    return;
  }
  chats.sort((a,b) => b.updatedAt - a.updatedAt).forEach(chat => {
    const preview = chat.messages.find(m => m.role === 'user')?.content?.slice(0,40) || 'Новый чат';
    const count = chat.messages.filter(m => m.role === 'user').length;
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.innerHTML = `
      <div class="chat-row-icon">💬</div>
      <div class="chat-row-body">
        <div class="chat-row-title">${preview}</div>
        <div class="chat-row-meta">${count} сообщений</div>
      </div>
      <div class="chat-row-chevron">›</div>`;
    row.onclick = () => loadChat(chat);
    list.appendChild(row);
  });
}

function loadChat(chat) {
  currentChatId = chat.id;
  messages = [...chat.messages];
  document.getElementById('quick-screen').style.display = 'none';
  const messagesEl = document.getElementById('messages');
  messagesEl.style.display = '';
  messagesEl.innerHTML = '';
  messages.forEach(m => messagesEl.appendChild(renderBubble(m)));
  switchTab('chat');
  setTimeout(scrollToBottom, 100);
}
</script>
</body>
</html>
